<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Legal AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

<div class="text-center mb-8">
<div class="w-12 h-12 bg-blue-600 rounded-lg mx-auto flex items-center justify-center mb-4">
<span class="material-icons text-white">gavel</span>
</div>
<h2 class="text-2xl font-bold">Welcome Back</h2>
<p class="text-sm text-slate-500">Login to your Legal AI account</p>
</div>

<form method="POST" action="/login" class="space-y-6">

<div>
<label class="block text-sm font-medium mb-1">Email</label>
<input type="email" name="email" required
class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
</div>

<div>
<label class="block text-sm font-medium mb-1">Password</label>
<input type="password" name="password" required
class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
</div>

<button type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
Login
</button>

</form>

<p class="text-sm text-center mt-6">
Don't have an account?
<a href="/signup" class="text-blue-600 font-medium hover:underline">Sign Up</a>
</p>

</div>

</body>
</html>
