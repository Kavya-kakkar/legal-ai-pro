<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Legal AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

<div class="text-center mb-8">
<div class="w-12 h-12 bg-blue-600 rounded-lg mx-auto flex items-center justify-center mb-4">
<span class="material-icons text-white">gavel</span>
</div>
<h2 class="text-2xl font-bold">Create Account</h2>
<p class="text-sm text-slate-500">Join Legal AI Assistant</p>
</div>

<form method="POST" action="/signup" class="space-y-6">

<div>
<label class="block text-sm font-medium mb-1">Full Name</label>
<input type="text" name="name" required
class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
</div>

<div>
<label class="block text-sm font-medium mb-1">Email</label>
<input type="email" name="email" required
class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
</div>

<div>
<label class="block text-sm font-medium mb-1">Password</label>
<input type="password" name="password" required
class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
</div>

<button type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition">
Create Account
</button>

</form>

<p class="text-sm text-center mt-6">
Already have an account?
<a href="/login" class="text-blue-600 font-medium hover:underline">Login</a>
</p>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    
    if (error) {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-lg text-center font-medium';
        alertDiv.textContent = error;
        document.querySelector('form').before(alertDiv);
    }
</script>

</body>
</html>
